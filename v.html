<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pilih Proyek</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Playfair Display', serif;
    background-color: #f5e6d3;
    background-image: url("https://www.transparenttextures.com/patterns/aged-paper.png");
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: #4b2e2e;
}

/* Container */
.container {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
}

/* Card */
.card {
    width: 280px;
    padding: 50px 30px;
    background: rgba(255, 248, 230, 0.95);
    border-radius: 16px;
    border: 3px solid #8b5e3c;
    box-shadow: 0 10px 25px rgba(75, 46, 46, 0.3);
    text-align: center;
    cursor: pointer;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
}

/* Ornamen garis klasik */
.card::before {
    content: "";
    position: absolute;
    top: 15px;
    left: 20px;
    right: 20px;
    height: 2px;
    background: #8b5e3c;
}

.card::after {
    content: "";
    position: absolute;
    bottom: 15px;
    left: 20px;
    right: 20px;
    height: 2px;
    background: #8b5e3c;
}

.card h2 {
    margin: 0;
    font-family: 'Cinzel', serif;
    letter-spacing: 2px;
    font-size: 22px;
}

/* Hover effect */
.card:hover {
    transform: translateY(-10px);
    background: #f0d9b5;
    box-shadow: 0 15px 35px rgba(75, 46, 46, 0.4);
}

/* Personal style */
.personal {
    border-color: #6f4e37;
}

/* Team style */
.team {
    border-color: #4b2e2e;
}

/* Responsive */
@media (max-width: 600px) {
    .card {
        width: 100%;
        max-width: 320px;
        padding: 40px 20px;
    }

    .card h2 {
        font-size: 18px;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="card personal" onclick="goTo('personal.html')">
        <h2>Proyek Pribadi</h2>
    </div>

    <div class="card team" onclick="goTo('team.html')">
        <h2>Proyek Tim</h2>
    </div>
</div>

<script>
function goTo(page) {
    window.location.href = page;
}
</script>

</body>
</html>
